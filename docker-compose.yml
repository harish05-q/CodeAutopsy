services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CODEAUTOPSY_DEBUG=false
      - CODEAUTOPSY_LOG_LEVEL=INFO
      - CODEAUTOPSY_GROQ_API_KEY=${CODEAUTOPSY_GROQ_API_KEY:-}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
